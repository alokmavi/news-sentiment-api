name: Daily Sentiment Pipeline

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  execute_pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sentiment_user
          POSTGRES_PASSWORD: sentiment_password
          POSTGRES_DB: sentiment_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Using a stable runner version
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Database Migrations
        env:
          DATABASE_URL: postgresql+psycopg2://sentiment_user:sentiment_password@localhost:5432/sentiment_db
        run: alembic upgrade head

      - name: Run Ingestion Pipeline
        env:
          DATABASE_URL: postgresql+psycopg2://sentiment_user:sentiment_password@localhost:5432/sentiment_db
        run: python -m src.ingestion.rss_fetcher

      - name: Run ML Inference Batch
        env:
          DATABASE_URL: postgresql+psycopg2://sentiment_user:sentiment_password@localhost:5432/sentiment_db
        run: python -m src.services.batch_processor

      - name: Export Daily Metrics
        env:
          DATABASE_URL: postgresql+psycopg2://sentiment_user:sentiment_password@localhost:5432/sentiment_db
        run: python -m src.scripts.export_metrics

      - name: Commit and Push Results
        run: |
          git config --global user.name "Alok Kumar Mavi"
          git config --global user.email "alokkumarmavi007@gmail.com"
          git add latest_sentiment.json
          # Only commit if there are actual changes to prevent workflow failures
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): automated daily sentiment aggregation" && git push)